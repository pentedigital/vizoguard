server {
    server_name vizoguard.com www.vizoguard.com;

    # Static site
    root /var/www/vizoguard/public;
    index index.html;

    # Prevent duplicate URL indexing
    location = /download.html {
        return 301 /download;
    }

    # Clean URLs: /pricing → /pricing.html, /blog/what-is-vpn → /blog/what-is-vpn.html
    location / {
        try_files $uri $uri/ $uri.html =404;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Security headers (included in every location)
    include /etc/nginx/snippets/security-headers.conf;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_buffering on;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Desktop app downloads
    location /downloads/ {
        alias /var/www/vizoguard/downloads/;
        autoindex off;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Service worker — never cache (ensures clients get updates)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # HTML pages — no cache so updates propagate immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Static assets — long cache (CSS/JS/icons)
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vizoguard.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vizoguard.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.vizoguard.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = vizoguard.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name vizoguard.com www.vizoguard.com;
    return 404; # managed by Certbot
}
